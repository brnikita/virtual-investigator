# Local Supabase config for `supabase start`.
# Project ref is set on link: `supabase link --project-ref <ref>`.

project_id = "virtual-investigator"

[api]
enabled = true
# Alt ports (64xxx) so we don't collide with other local Supabase projects.
port = 64321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 64322
shadow_port = 64320
major_version = 15

[db.pooler]
enabled = false
port = 64329

[studio]
enabled = true
port = 64323

[inbucket]
enabled = true
port = 64324
smtp_port = 64325
pop3_port = 64326

[analytics]
enabled = true
port = 64327
vector_port = 64328
backend = "postgres"

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 64383
